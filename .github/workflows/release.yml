name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version bump to apply. Use auto to infer from conventional commits.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - no_bump
          - patch
          - minor
          - major
      dry_run:
        description: Run checks and compute the release plan without publishing.
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Determine release plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(npx --yes pkgv)"
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          recommended_release_type="$(./node_modules/.bin/conventional-recommended-bump -p angular || true)"
          requested_release_type="${{ inputs.release_type }}"

          if [[ "$requested_release_type" == "auto" ]]; then
            release_type="$recommended_release_type"
          else
            release_type="$requested_release_type"
          fi

          if [[ -z "$release_type" ]]; then
            echo "No release bump could be inferred. Use no_bump or an explicit release type."
            exit 1
          fi

          if [[ "$release_type" == "no_bump" ]]; then
            next_version="$current_version"
          else
            IFS='.' read -r major minor patch <<< "$current_version"

            case "$release_type" in
              major)
                next_version="$((major + 1)).0.0"
                ;;
              minor)
                next_version="${major}.$((minor + 1)).0"
                ;;
              patch)
                next_version="${major}.${minor}.$((patch + 1))"
                ;;
              *)
                echo "Unsupported release type: $release_type"
                exit 1
                ;;
            esac
          fi

          tag_name="v$next_version"

          {
            echo "release_type=$release_type"
            echo "next_version=$next_version"
            echo "tag_name=$tag_name"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release tag does not already exist
        run: |
          if git rev-parse "${{ steps.plan.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.plan.outputs.tag_name }} already exists."
            exit 1
          fi

      - name: Update package version
        if: ${{ steps.plan.outputs.release_type != 'no_bump' }}
        run: npm version "${{ steps.plan.outputs.release_type }}" --no-git-tag-version

      - name: Run lint
        run: npm run lint

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: ${{ !inputs.dry_run && steps.plan.outputs.release_type != 'no_bump' }}
        run: |
          git add package.json
          git commit -m "${{ steps.plan.outputs.tag_name }}"

      - name: Create git tag
        if: ${{ !inputs.dry_run }}
        run: git tag "${{ steps.plan.outputs.tag_name }}"

      - name: Push release commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin HEAD
          git push origin "${{ steps.plan.outputs.tag_name }}"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        run: gh release create "${{ steps.plan.outputs.tag_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
